<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Dinosaur - Pteradactal</title>
    
    <!-- ===== STYLES ===== -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- ===== THREE.JS ===== -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loader-container">
            <div class="loader"></div>
            <p id="loading-text">Loading Pteradactal...</p>
        </div>
    </div>
    
    <!-- Instructions -->
    <div id="instructions">
        <div class="instruction-box">
            <h2>🦕 AR Pteradactal</h2>
            <p>Place the QR code in view<br>to see the Pteradactal come to life!</p>
            <button id="start-ar-btn">📷 Start AR</button>
            <div id="status-container" style="margin-top: 15px;">
                <p id="permission-status" style="font-size: 14px; opacity: 0.7;"></p>
                <div id="ar-progress" style="display: none; margin-top: 10px;">
                    <div style="width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden;">
                        <div id="ar-progress-bar" style="width: 0%; height: 100%; background: linear-gradient(90deg, #00d4ff, #0072ff); transition: width 0.3s;"></div>
                    </div>
                    <p id="ar-progress-text" style="font-size: 12px; opacity: 0.5; margin-top: 5px;">Initializing...</p>
                </div>
            </div>
        </div>
    </div>
    
    <!-- AR Container -->
    <div id="ar-container"></div>
    
    <!-- Status Message -->
    <div id="status-message"></div>
    
    <!-- Debug Info -->
    <div id="debug-info"></div>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
        
        // ===== CONFIGURATION =====
        const CONFIG = {
            modelPath: './models/dinosaur/Pteradactal.glb',
            modelScale: 0.5,
            modelPosition: new THREE.Vector3(0, 0, -0.5),
        };
        
        // ===== DOM REFS =====
        const loadingScreen = document.getElementById('loading-screen');
        const loadingText = document.getElementById('loading-text');
        const instructions = document.getElementById('instructions');
        const startBtn = document.getElementById('start-ar-btn');
        const permissionStatus = document.getElementById('permission-status');
        const statusMsg = document.getElementById('status-message');
        const debugInfo = document.getElementById('debug-info');
        const container = document.getElementById('ar-container');
        const arProgress = document.getElementById('ar-progress');
        const arProgressBar = document.getElementById('ar-progress-bar');
        const arProgressText = document.getElementById('ar-progress-text');
        
        // ===== STATE =====
        let scene, camera, renderer;
        let model = null;
        let arSession = null;
        let isRunning = false;
        let hasCameraPermission = false;
        let isArStarting = false;
        
        // ===== DEBUG =====
        function debug(message) {
            console.log('🔍', message);
            if (debugInfo) {
                debugInfo.textContent = message;
                debugInfo.classList.add('show');
            }
        }
        
        // ===== STATUS =====
        function showStatus(message, type = '') {
            statusMsg.textContent = message;
            statusMsg.className = 'visible ' + type;
            console.log('📱', message);
            
            if (type === 'error') {
                setTimeout(() => {
                    statusMsg.className = '';
                }, 8000);
            }
        }
        
        // ===== UPDATE AR PROGRESS =====
        function updateARProgress(percent, text) {
            arProgress.style.display = 'block';
            arProgressBar.style.width = percent + '%';
            arProgressText.textContent = text;
        }
        
        // ===== REQUEST CAMERA PERMISSION =====
        async function requestCameraPermission() {
            debug('📷 Requesting camera permission...');
            permissionStatus.textContent = '📷 Requesting camera access...';
            startBtn.textContent = '⏳ Requesting permission...';
            startBtn.disabled = true;
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'environment',
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    }
                });
                
                hasCameraPermission = true;
                debug('✅ Camera permission granted!');
                permissionStatus.textContent = '✅ Camera access granted!';
                permissionStatus.style.color = '#00d4ff';
                startBtn.textContent = '📷 Start AR';
                startBtn.disabled = false;
                
                stream.getTracks().forEach(track => track.stop());
                return true;
                
            } catch (error) {
                debug('❌ Camera permission denied: ' + error.message);
                permissionStatus.textContent = '❌ Camera access denied. Please enable in browser settings.';
                permissionStatus.style.color = '#ff4444';
                startBtn.textContent = '🔄 Retry';
                startBtn.disabled = false;
                showStatus('❌ Camera permission needed', 'error');
                return false;
            }
        }
        
        // ===== SETUP SCENE =====
        function setupScene() {
            debug('Setting up scene...');
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);
            
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 1.6, 0);
            
            renderer = new THREE.WebGLRenderer({
                antialias: true,
                alpha: false
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.xr.enabled = true;
            renderer.xr.setReferenceSpaceType('local-floor');
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.0;
            
            container.appendChild(renderer.domElement);
            debug('✅ Scene setup complete');
        }
        
        // ===== SETUP LIGHTS =====
        function setupLights() {
            debug('Setting up lights...');
            
            const ambient = new THREE.AmbientLight(0x404040, 0.5);
            scene.add(ambient);
            
            const directional = new THREE.DirectionalLight(0xffffff, 1.0);
            directional.position.set(0, 5, 5);
            directional.castShadow = true;
            scene.add(directional);
            
            const fill = new THREE.DirectionalLight(0x4488ff, 0.3);
            fill.position.set(-5, 0, 5);
            scene.add(fill);
            
            const back = new THREE.DirectionalLight(0xff8844, 0.2);
            back.position.set(0, 0, -5);
            scene.add(back);
            
            const hemi = new THREE.HemisphereLight(0x87ceeb, 0x362d1e, 0.3);
            scene.add(hemi);
            
            debug('✅ Lights setup complete');
        }
        
        // ===== LOAD MODEL =====
        function loadModel() {
            return new Promise((resolve, reject) => {
                debug('Loading model...');
                loadingText.textContent = '🦕 Loading Pteradactal...';
                
                const loader = new GLTFLoader();
                const dracoLoader = new DRACOLoader();
                dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
                loader.setDRACOLoader(dracoLoader);
                
                loader.load(
                    CONFIG.modelPath,
                    (gltf) => {
                        debug('✅ Model loaded!');
                        model = gltf.scene;
                        model.scale.set(CONFIG.modelScale, CONFIG.modelScale, CONFIG.modelScale);
                        model.position.copy(CONFIG.modelPosition);
                        
                        if (gltf.animations && gltf.animations.length > 0) {
                            const mixer = new THREE.AnimationMixer(model);
                            const action = mixer.clipAction(gltf.animations[0]);
                            action.play();
                            model.userData.mixer = mixer;
                            debug('🎬 Animation playing');
                        }
                        
                        model.traverse((node) => {
                            if (node.isMesh) {
                                node.castShadow = true;
                                node.receiveShadow = true;
                            }
                        });
                        
                        loadingText.textContent = '✅ Pteradactal ready!';
                        setTimeout(() => {
                            loadingScreen.classList.add('hidden');
                        }, 500);
                        
                        resolve(model);
                    },
                    (progress) => {
                        const pct = Math.round((progress.loaded / progress.total) * 100);
                        loadingText.textContent = `📥 Loading... ${pct}%`;
                    },
                    (error) => {
                        debug('❌ Model load error: ' + error.message);
                        loadingText.textContent = '❌ Failed to load model';
                        reject(error);
                    }
                );
            });
        }
        
        // ===== START AR =====
        async function startAR() {
            if (isArStarting) return;
            isArStarting = true;
            
            debug('🚀 Starting AR...');
            showStatus('📷 Starting AR...', '');
            startBtn.textContent = '⏳ Starting...';
            startBtn.disabled = true;
            
            // Show progress
            arProgress.style.display = 'block';
            updateARProgress(10, 'Checking AR support...');
            
            try {
                // Step 1: Check WebXR
                updateARProgress(20, 'Checking WebXR...');
                if (!navigator.xr) {
                    throw new Error('WebXR not supported');
                }
                
                // Step 2: Check AR support
                updateARProgress(30, 'Checking AR support...');
                let supported = false;
                try {
                    supported = await navigator.xr.isSessionSupported('immersive-ar');
                } catch (e) {
                    throw new Error('Cannot check AR support');
                }
                
                if (!supported) {
                    throw new Error('AR not supported on this device');
                }
                debug('✅ AR is supported');
                
                // Step 3: Check camera permission
                updateARProgress(40, 'Checking camera permission...');
                if (!hasCameraPermission) {
                    const granted = await requestCameraPermission();
                    if (!granted) {
                        throw new Error('Camera permission required');
                    }
                }
                
                // Step 4: Create AR session with proper options
                updateARProgress(50, 'Creating AR session...');
                debug('Creating AR session...');
                
                // Create a direct session without ARButton
                const session = await navigator.xr.requestSession('immersive-ar', {
                    requiredFeatures: ['local-floor'],
                    optionalFeatures: ['hit-test', 'dom-overlay'],
                    domOverlay: { root: document.body }
                });
                
                debug('✅ AR Session created!');
                arSession = session;
                isRunning = true;
                updateARProgress(70, 'Setting up AR renderer...');
                
                // Set up the renderer for XR
                renderer.xr.setSession(session);
                
                // Add model to scene
                if (model) {
                    scene.add(model);
                    model.visible = true;
                    // Scale animation
                    model.scale.set(0, 0, 0);
                    animateScale(model, 0, CONFIG.modelScale, 500);
                    debug('✅ Model added to scene');
                }
                
                updateARProgress(90, 'AR ready!');
                showStatus('✅ AR active!', 'success');
                
                // Hide instructions
                instructions.style.display = 'none';
                startBtn.textContent = '✅ AR Active';
                
                // Start the render loop
                renderer.setAnimationLoop(() => {
                    if (model && model.userData && model.userData.mixer) {
                        model.userData.mixer.update(0.016);
                    }
                    renderer.render(scene, camera);
                });
                
                // Handle session end
                session.addEventListener('end', () => {
                    debug('⏹️ AR Session ended');
                    isRunning = false;
                    renderer.setAnimationLoop(null);
                    showStatus('AR session ended', '');
                    startBtn.textContent = '📷 Restart AR';
                    startBtn.disabled = false;
                    isArStarting = false;
                    instructions.style.display = 'flex';
                });
                
                // Handle visibility change (pause when tab hidden)
                document.addEventListener('visibilitychange', () => {
                    if (document.hidden && isRunning) {
                        debug('⏸️ Tab hidden - pausing AR');
                    } else if (!document.hidden && isRunning) {
                        debug('▶️ Tab visible - resuming AR');
                    }
                });
                
                updateARProgress(100, '✅ AR Active!');
                setTimeout(() => {
                    arProgress.style.display = 'none';
                }, 1000);
                
                isArStarting = false;
                
            } catch (error) {
                debug('❌ AR start failed: ' + error.message);
                showStatus('❌ ' + error.message, 'error');
                startBtn.textContent = '🔄 Retry';
                startBtn.disabled = false;
                isArStarting = false;
                arProgress.style.display = 'none';
                
                // Show fallback
                showFallback(error.message);
            }
        }
        
        // ===== ANIMATE SCALE =====
        function animateScale(object, from, to, duration) {
            const startTime = Date.now();
            
            function update() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const eased = 1 - Math.pow(1 - progress, 3);
                const scale = from + (to - from) * eased;
                
                object.scale.set(scale, scale, scale);
                
                if (progress < 1) {
                    requestAnimationFrame(update);
                }
            }
            update();
        }
        
        // ===== FALLBACK =====
        function showFallback(message) {
            let fallback = document.getElementById('fallback');
            if (!fallback) {
                fallback = document.createElement('div');
                fallback.id = 'fallback';
                fallback.style.cssText = `
                    position: fixed;
                    top: 0;
                    left: 0;
                    width: 100%;
                    height: 100%;
                    background: #1a1a2e;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    z-index: 500;
                    padding: 20px;
                `;
                document.body.appendChild(fallback);
            }
            
            fallback.innerHTML = `
                <div style="max-width: 400px; background: rgba(255,255,255,0.05); padding: 40px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); text-align: center; color: white;">
                    <h2 style="color: #ff6b6b; margin-bottom: 15px;">⚠️ AR Not Available</h2>
                    <p style="opacity: 0.8; margin-bottom: 20px; line-height: 1.6;">
                        ${message}<br><br>
                        <strong>Try these solutions:</strong>
                        <br>• Use <strong>Chrome</strong> on Android
                        <br>• Use <strong>Safari</strong> on iOS 15+
                        <br>• Make sure you're on <strong>HTTPS</strong>
                        <br>• Check camera permissions in settings
                    </p>
                    <a href="desktop-viewer.html" style="display: inline-block; padding: 12px 30px; background: #00d4ff; color: #000; text-decoration: none; border-radius: 10px; font-weight: bold; margin: 10px;">View 3D Model</a>
                    <br>
                    <button onclick="location.reload()" style="padding: 12px 30px; background: transparent; border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: 10px; cursor: pointer; margin: 10px;">🔄 Retry</button>
                </div>
            `;
            fallback.style.display = 'flex';
        }
        
        // ===== RESIZE =====
        function onResize() {
            if (camera) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
            }
            if (renderer) {
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        }
        
        // ===== CHECK HTTPS =====
        function checkHTTPS() {
            if (window.location.protocol !== 'https:' && 
                window.location.hostname !== 'localhost' && 
                window.location.hostname !== '127.0.0.1') {
                console.warn('⚠️ Not running on HTTPS. AR may not work.');
                showStatus('⚠️ Use HTTPS for AR', 'error');
                return false;
            }
            return true;
        }
        
        // ===== INIT =====
        async function init() {
            debug('🚀 Initializing AR Pteradactal...');
            debug('📱 Device: ' + navigator.userAgent);
            debug('🔗 Protocol: ' + window.location.protocol);
            
            checkHTTPS();
            
            try {
                setupScene();
                setupLights();
                await loadModel();
                
                // Check camera permission status
                try {
                    const permStatus = await navigator.permissions?.query({ name: 'camera' });
                    if (permStatus?.state === 'granted') {
                        hasCameraPermission = true;
                        permissionStatus.textContent = '✅ Camera permission granted';
                        permissionStatus.style.color = '#00d4ff';
                    } else {
                        permissionStatus.textContent = '📷 Click "Start AR" to request camera access';
                        permissionStatus.style.color = '#ffaa00';
                    }
                } catch (e) {
                    permissionStatus.textContent = '📷 Camera permission required';
                }
                
                instructions.style.display = 'flex';
                debug('✅ Ready!');
                
                // Start AR button
                startBtn.addEventListener('click', async () => {
                    // If we don't have permission, request it first
                    if (!hasCameraPermission) {
                        const granted = await requestCameraPermission();
                        if (granted) {
                            await startAR();
                        }
                    } else {
                        await startAR();
                    }
                });
                
                window.addEventListener('resize', onResize);
                
            } catch (error) {
                debug('❌ Init error: ' + error.message);
                showStatus('❌ Failed to initialize: ' + error.message, 'error');
                showFallback(error.message);
            }
        }
        
        // ===== START =====
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
