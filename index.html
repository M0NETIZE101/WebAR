<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AR Experience</title>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <!-- AR.js -->
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.min.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="permission-overlay">
        <div class="icon">📷</div>
        <h1>AR Experience</h1>
        <p>Point your camera at the Hiro marker to see the 3D car.</p>
        <button id="start-btn">Start AR</button>
    </div>

    <div id="error-screen">
        <div class="icon">⚠️</div>
        <h2>Camera Access Required</h2>
        <p id="error-message">Camera permission was denied.</p>
        <button id="reload-btn">🔄 Reload</button>
    </div>

    <div id="loading" class="hidden">
        <div class="spinner"></div>
        <span id="loading-text">Loading AR...</span>
    </div>

    <div id="marker-prompt" class="hidden">📍 Point your camera at the marker</div>

    <a-scene
        id="ar-scene"
        embedded
        vr-mode-ui="enabled: false"
        renderer="logarithmicDepthBuffer: true; antialias: true;"
        loading-screen="enabled: false"
    >

        <!-- ==========================================
             🔥 OPTIMIZED LIGHTING (No Environment)
             ========================================== -->

        <!-- Ambient light — soft fill (brighter) -->
        <a-entity light="type: ambient; intensity: 0.8; color: #ffffff;"></a-entity>

        <!-- Key light — bright directional from front-top-right -->
        <a-entity light="type: directional; intensity: 1.5; color: #ffffff;" position="2 3 2"></a-entity>

        <!-- Fill light — softer from left -->
        <a-entity light="type: directional; intensity: 0.8; color: #8888ff;" position="-2 1 -1"></a-entity>

        <!-- Rim light — warm from back -->
        <a-entity light="type: directional; intensity: 0.6; color: #ffaa66;" position="0 -1 2"></a-entity>

        <!-- Top light — extra brightness from above -->
        <a-entity light="type: directional; intensity: 0.5; color: #ffffff;" position="0 4 0"></a-entity>

        <!-- ==========================================
             MARKER & MODEL
             ========================================== -->

        <a-marker 
            id="ar-marker" 
            preset="hiro" 
            emitevents="true" 
            smooth="true" 
            smoothCount="5"
        >

            <!-- 🔥 CAR MODEL with brighter material -->
            <a-entity
                id="model-entity"
                gltf-model="url(model.glb)"
                scale="0.5 0.5 0.5"
                position="0 0.5 0"
                rotation="0 0 0"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear"
                material="
                    shader: standard;
                    color: #ffffff;
                    metalness: 0.2;
                    roughness: 0.4;
                    emissive: #333333;
                    emissiveIntensity: 0.15;
                    transparent: false;
                    opacity: 1;
                "
            ></a-entity>

            <!-- Shadow disc -->
            <a-entity position="0 -0.02 0" rotation="-90 0 0">
                <a-circle material="color: black; transparent: true; opacity: 0.15;" radius="0.5"></a-circle>
            </a-entity>

        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script src="app.js"></script>

</body>
</html>
