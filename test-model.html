<!DOCTYPE html>
<html>
<head>
    <title>Test Model Load</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a2e; color: white; font-family: Arial; }
        #info { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); padding: 15px 30px; border-radius: 10px; z-index: 10; }
        #info.success { border: 2px solid #00d4ff; }
        #info.error { border: 2px solid #ff4444; }
    </style>
</head>
<body>
    <div id="info">Loading model...</div>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        
        const info = document.getElementById('info');
        info.textContent = '🔍 Checking model file...';
        
        // Check if model exists
        const modelPath = './models/dinosaur/Pteradactal.glb';
        
        fetch(modelPath)
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                info.textContent = '✅ Model file found! Loading...';
                info.className = 'success';
                return response;
            })
            .then(() => {
                // Setup scene
                const scene = new THREE.Scene();
                scene.background = new THREE.Color(0x1a1a2e);
                
                const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
                camera.position.set(3, 2, 5);
                
                const renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(window.devicePixelRatio);
                document.body.appendChild(renderer.domElement);
                
                // Controls
                const controls = new OrbitControls(camera, renderer.domElement);
                controls.enableDamping = true;
                
                // Lights
                const ambient = new THREE.AmbientLight(0x404040, 0.5);
                scene.add(ambient);
                
                const directional = new THREE.DirectionalLight(0xffffff, 1.0);
                directional.position.set(5, 5, 5);
                scene.add(directional);
                
                const hemi = new THREE.HemisphereLight(0x87ceeb, 0x362d1e, 0.3);
                scene.add(hemi);
                
                // Load model
                const loader = new GLTFLoader();
                info.textContent = '📦 Loading GLB file...';
                
                loader.load(
                    modelPath,
                    (gltf) => {
                        const model = gltf.scene;
                        scene.add(model);
                        
                        // Center and scale model
                        const box = new THREE.Box3().setFromObject(model);
                        const center = box.getCenter(new THREE.Vector3());
                        model.position.sub(center);
                        
                        const size = box.getSize(new THREE.Vector3());
                        const maxDim = Math.max(size.x, size.y, size.z);
                        const scale = 2 / maxDim;
                        model.scale.set(scale, scale, scale);
                        
                        info.textContent = '✅ Model loaded successfully!';
                        info.className = 'success';
                        
                        // Play animation if exists
                        if (gltf.animations && gltf.animations.length > 0) {
                            const mixer = new THREE.AnimationMixer(model);
                            const action = mixer.clipAction(gltf.animations[0]);
                            action.play();
                            
                            function animate() {
                                requestAnimationFrame(animate);
                                mixer.update(0.016);
                                controls.update();
                                renderer.render(scene, camera);
                            }
                            animate();
                            info.textContent += ' 🎬 Animation playing!';
                        } else {
                            function animate() {
                                requestAnimationFrame(animate);
                                controls.update();
                                renderer.render(scene, camera);
                            }
                            animate();
                        }
                    },
                    (progress) => {
                        const percent = Math.round((progress.loaded / progress.total) * 100);
                        info.textContent = `📥 Loading... ${percent}%`;
                    },
                    (error) => {
                        console.error('Error loading model:', error);
                        info.textContent = `❌ Error: ${error.message}`;
                        info.className = 'error';
                    }
                );
                
                window.addEventListener('resize', () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                });
            })
            .catch(error => {
                console.error('Model check failed:', error);
                info.textContent = `❌ ${error.message}`;
                info.className = 'error';
            });
    </script>
</body>
</html>
