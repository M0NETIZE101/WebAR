<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AR Experience</title>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <!-- AR.js -->
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.min.js"></script>
    <!-- aframe-extras for animation-mixer -->
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        /* Additional styles for model buttons */
        #model-bar {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            gap: 12px;
            pointer-events: auto;
        }

        .model-btn {
            padding: 10px 24px;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.7);
            color: #fff;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }

        .model-btn.active {
            border-color: #6C5CE7;
            background: rgba(108, 92, 231, 0.3);
            box-shadow: 0 0 20px rgba(108, 92, 231, 0.2);
        }

        .model-btn:hover {
            border-color: rgba(255,255,255,0.5);
        }

        @media (max-width: 480px) {
            #model-bar {
                bottom: 80px;
                gap: 8px;
            }
            .model-btn {
                padding: 8px 16px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== PERMISSION OVERLAY ===== -->
    <div id="permission-overlay">
        <div class="icon">📷</div>
        <h1>AR Experience</h1>
        <p>Point your camera at the Hiro marker to see the 3D models.</p>
        <button id="start-btn">Start AR</button>
    </div>

    <!-- ===== ERROR SCREEN ===== -->
    <div id="error-screen">
        <div class="icon">⚠️</div>
        <h2>Camera Access Required</h2>
        <p id="error-message">Camera permission was denied.</p>
        <button id="reload-btn">🔄 Reload</button>
    </div>

    <!-- ===== LOADING INDICATOR ===== -->
    <div id="loading" class="hidden">
        <div class="spinner"></div>
        <span id="loading-text">Loading AR...</span>
    </div>

    <!-- ===== MARKER PROMPT ===== -->
    <div id="marker-prompt" class="hidden">📍 Point your camera at the marker</div>

    <!-- ===== MODEL SWITCHING BAR ===== -->
    <div id="model-bar">
        <button class="model-btn active" data-model="car">🚗 Car</button>
        <button class="model-btn" data-model="mecha">🤖 Mecha</button>
    </div>

    <!-- ===== A-FRAME SCENE ===== -->
    <a-scene
        id="ar-scene"
        embedded
        vr-mode-ui="enabled: false"
        renderer="logarithmicDepthBuffer: true; antialias: true;"
        loading-screen="enabled: false"
        shadow="enabled: false;"
    >

        <!-- ==========================================
             LIGHTING — NO SHADOWS
             ========================================== -->

        <!-- Ambient light — soft fill -->
        <a-entity light="type: ambient; intensity: 0.7; color: #ffffff;"></a-entity>

        <!-- Key light — bright directional -->
        <a-entity light="type: directional; intensity: 1.2; color: #ffffff;" position="2 3 2"></a-entity>

        <!-- Fill light — from left -->
        <a-entity light="type: directional; intensity: 1.0; color: #ffffff;" position="-2 2 -1"></a-entity>

        <!-- Rim light — from back -->
        <a-entity light="type: directional; intensity: 0.8; color: #ffffff;" position="0 -1 2"></a-entity>

        <!-- Extra fill lights -->
        <a-entity light="type: directional; intensity: 0.6; color: #ffffff;" position="2 -1 -2"></a-entity>
        <a-entity light="type: directional; intensity: 0.6; color: #ffffff;" position="-2 -1 2"></a-entity>

        <!-- ==========================================
             MARKER & MODELS
             ========================================== -->

        <a-marker 
            id="ar-marker" 
            preset="hiro" 
            emitevents="true" 
            smooth="true" 
            smoothCount="5"
        >

            <!-- 🔥 CAR MODEL -->
            <a-entity
                id="car-model"
                gltf-model="url(model.glb)"
                scale="0.15 0.15 0.15"
                position="0 0.2 0"
                rotation="0 0 0"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear"
                visible="true"
            ></a-entity>

            <!-- 🔥 MECHA MODEL — WITH WALKING ANIMATION -->
            <a-entity
                id="mecha-model"
                gltf-model="url(mecha.glb)"
                scale="0.25 0.25 0.25"
                position="0 0.2 0"
                rotation="0 0 0"
                animation-mixer="clip: *; loop: repeat; timeScale: 1;"
                visible="false"
            ></a-entity>

            <!-- Shadow disc (grounding) -->
            <a-entity position="0 -0.02 0" rotation="-90 0 0">
                <a-circle material="color: black; transparent: true; opacity: 0.15;" radius="0.4"></a-circle>
            </a-entity>

        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <!-- JavaScript -->
    <script type="module" src="js/app.js"></script>

</body>
</html>
