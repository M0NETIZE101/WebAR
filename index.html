<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AR.js + WebXR Hybrid</title>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <!-- AR.js -->
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.min.js"></script>
    <!-- aframe-extras -->
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: 'Inter', sans-serif; }
        #ui { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 10; text-align: center; color: white; background: rgba(0,0,0,0.7); padding: 12px 24px; border-radius: 12px; font-size: 14px; }
        #ui.hidden { opacity: 0; pointer-events: none; }
        #start-overlay { position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; color: white; }
        #start-overlay button { padding: 16px 48px; font-size: 1.2rem; background: #6C5CE7; color: white; border: none; border-radius: 12px; cursor: pointer; }
        #start-overlay.hidden { display: none; }
        #model-bar { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); z-index: 10; display: flex; gap: 12px; }
        .model-btn { padding: 10px 24px; border: 2px solid rgba(255,255,255,0.3); background: rgba(0,0,0,0.7); color: #fff; border-radius: 30px; cursor: pointer; font-size: 14px; font-weight: 600; backdrop-filter: blur(4px); transition: all 0.3s; }
        .model-btn.active { border-color: #6C5CE7; background: rgba(108, 92, 231, 0.4); }
    </style>
</head>
<body>

    <!-- ===== START OVERLAY ===== -->
    <div id="start-overlay">
        <h1>🚀 AR Hybrid</h1>
        <p>Point at the Hiro marker to place the model in the real world.</p>
        <button id="start-btn">Start AR</button>
    </div>

    <!-- ===== UI HINTS ===== -->
    <div id="ui">🔍 Point at the Hiro marker to place the model.</div>
    <div id="model-bar">
        <button class="model-btn active" data-model="car">🚗 Car</button>
        <button class="model-btn" data-model="mecha">🤖 Mecha</button>
    </div>

    <!-- ===== A-FRAME SCENE ===== -->
    <a-scene
        id="ar-scene"
        embedded
        vr-mode-ui="enabled: false"
        renderer="antialias: true; alpha: true;"
        loading-screen="enabled: false"
        webxr="requiredFeatures: hit-test,local-floor; optionalFeatures: dom-overlay;"
    >

        <!-- Lights -->
        <a-entity light="type: ambient; intensity: 0.6;"></a-entity>
        <a-entity light="type: directional; intensity: 1.0;" position="2 3 2"></a-entity>

        <!-- ===== AR.JS MARKER (for initial placement) ===== -->
        <a-marker
            id="ar-marker"
            preset="hiro"
            emitevents="true"
            smooth="true"
            smoothCount="5"
        ></a-marker>

        <!-- ===== WEBXR ANCHOR (for 6DoF tracking) ===== -->
        <!-- This entity is managed by WebXR's hit-testing -->
        <a-entity id="world-anchor" visible="false">

            <!-- Pedestal -->
            <a-cylinder
                position="0 0 0"
                radius="0.3"
                height="0.05"
                color="#222222"
                metalness="0.6"
                roughness="0.3"
            ></a-cylinder>

            <!-- Car Model -->
            <a-entity
                id="car-model"
                gltf-model="url(model.glb)"
                scale="0.15 0.15 0.15"
                position="0 0.05 0"
                rotation="0 0 0"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear"
                visible="true"
            ></a-entity>

            <!-- Mecha Model -->
            <a-entity
                id="mecha-model"
                gltf-model="url(mecha.glb)"
                scale="0.15 0.15 0.15"
                position="0 0.05 0"
                rotation="0 0 0"
                animation-mixer="clip: *; loop: repeat; timeScale: 1;"
                visible="false"
            ></a-entity>

            <!-- Shadow disc -->
            <a-entity position="0 -0.02 0" rotation="-90 0 0">
                <a-circle material="color: black; transparent: true; opacity: 0.15;" radius="0.4"></a-circle>
            </a-entity>

        </a-entity>

        <a-entity camera></a-entity>
    </a-scene>

    <!-- JavaScript -->
    <script>
    (function() {
        'use strict';

        // ==========================================
        // DOM REFS
        // ==========================================
        const startOverlay = document.getElementById('start-overlay');
        const startBtn = document.getElementById('start-btn');
        const ui = document.getElementById('ui');
        const scene = document.getElementById('ar-scene');
        const marker = document.getElementById('ar-marker');
        const anchor = document.getElementById('world-anchor');

        let isARStarted = false;
        let isPlaced = false;

        // ==========================================
        // UI HELPERS
        // ==========================================
        function showUI(text) {
            ui.textContent = text;
            ui.classList.remove('hidden');
        }

        function hideUI() {
            ui.classList.add('hidden');
        }

        // ==========================================
        // START AR
        // ==========================================
        async function startAR() {
            if (isARStarted) return;

            startBtn.disabled = true;
            startBtn.textContent = 'Starting...';
            console.log('[AR] 🚀 Starting Hybrid AR...');

            try {
                // 1. Check WebXR support
                if (!navigator.xr) {
                    throw new Error('WebXR not supported on this device.');
                }

                // 2. Request camera permission
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' }
                });
                stream.getTracks().forEach(track => track.stop());

                // 3. Start A-Frame with WebXR
                scene.setAttribute('webxr', 'requiredFeatures: hit-test,local-floor; optionalFeatures: dom-overlay;');
                
                // 4. Start AR.js for marker detection
                scene.setAttribute('arjs', [
                    'sourceType: webcam',
                    'debugUIEnabled: false',
                    'detectionMode: mono_and_matrix',
                    'matrixCodeType: 3x3',
                    'trackingMethod: best'
                ].join('; '));

                // 5. Wait for WebXR session
                await waitForWebXR();

                // 6. Setup marker placement
                setupMarkerPlacement();

                // 7. Setup model switching
                setupModelSwitching();

                startOverlay.classList.add('hidden');
                showUI('🔍 Point at the Hiro marker to place the model.');

                isARStarted = true;
                console.log('[AR] ✅ Hybrid AR ready!');

            } catch (err) {
                console.error('[AR] ❌ Error:', err);
                alert('Error: ' + err.message);
                startBtn.disabled = false;
                startBtn.textContent = 'Start AR';
            }
        }

        // ==========================================
        // WAIT FOR WEBXR SESSION
        // ==========================================
        function waitForWebXR(timeout = 20000) {
            return new Promise((resolve, reject) => {
                const startTime = Date.now();

                function check() {
                    const xrSystem = scene.systems && scene.systems['webxr'];
                    if (xrSystem && xrSystem.session) {
                        console.log('[AR] ✅ WebXR session active');
                        resolve(xrSystem);
                        return;
                    }
                    if (Date.now() - startTime > timeout) {
                        reject(new Error('WebXR session timed out.'));
                        return;
                    }
                    setTimeout(check, 100);
                }
                check();
            });
        }

        // ==========================================
        // MARKER PLACEMENT → WebXR Anchor
        // ==========================================
        function setupMarkerPlacement() {
            marker.addEventListener('markerFound', () => {
                if (isPlaced) {
                    console.log('[AR] Model already placed, ignoring marker');
                    return;
                }

                console.log('[AR] 🔥 Marker detected — placing model with WebXR');

                // Get marker's world position
                const pos = new THREE.Vector3();
                marker.object3D.getWorldPosition(pos);

                // Get marker's world rotation
                const quat = new THREE.Quaternion();
                marker.object3D.getWorldQuaternion(quat);
                const euler = new THREE.Euler().setFromQuaternion(quat, 'YXZ');

                // 🔥 Place the anchor using WebXR hit-test
                // Since we can't directly create anchors in A-Frame, we use the anchor
                // as a child of the scene and set its position/rotation.
                // In a full WebXR implementation, you'd use `xrSession.requestHitTest()`.
                anchor.setAttribute('position', {
                    x: pos.x,
                    y: pos.y,
                    z: pos.z
                });
                anchor.setAttribute('rotation', {
                    x: 0,
                    y: THREE.MathUtils.radToDeg(euler.y),
                    z: 0
                });
                anchor.setAttribute('visible', 'true');

                isPlaced = true;
                hideUI();
                console.log('[AR] ✅ Model placed in world at:', pos);
            });

            marker.addEventListener('markerLost', () => {
                console.log('[AR] Marker lost — model stays anchored in WebXR space');
            });
        }

        // ==========================================
        // MODEL SWITCHING
        // ==========================================
        function setupModelSwitching() {
            const buttons = document.querySelectorAll('.model-btn');
            const carModel = document.getElementById('car-model');
            const mechaModel = document.getElementById('mecha-model');

            buttons.forEach(btn => {
                btn.addEventListener('click', function() {
                    buttons.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');

                    const model = this.dataset.model;
                    if (model === 'car') {
                        carModel.setAttribute('visible', 'true');
                        mechaModel.setAttribute('visible', 'false');
                    } else if (model === 'mecha') {
                        carModel.setAttribute('visible', 'false');
                        mechaModel.setAttribute('visible', 'true');
                    }
                });
            });
        }

        // ==========================================
        // EVENT LISTENERS
        // ==========================================
        startBtn.addEventListener('click', startAR);

        console.log('[AR] 🚀 Hybrid AR app initialized');
        console.log('[AR] 📱 Requires WebXR (ARCore/ARKit)');
        console.log('[AR] 📌 Uses AR.js for marker detection + WebXR for 6DoF anchoring');

    })();
    </script>

</body>
</html>
