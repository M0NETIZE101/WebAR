<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR - Your Model</title>

    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; }
        .a-enter-vr { display: none; }
        #startOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); color: white; z-index: 999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: sans-serif; cursor: pointer;
        }
        #startOverlay button {
            padding: 20px 40px; font-size: 24px; background: #6C5CE7; color: white;
            border: none; border-radius: 12px; cursor: pointer;
        }
        #startOverlay.hidden { display: none; }
    </style>
</head>
<body>

    <div id="startOverlay">
        <h1>📷 AR Experience</h1>
        <p>Point your camera at the Hiro marker.</p>
        <button id="startBtn">Start Camera</button>
    </div>

    <a-scene
        id="scene"
        embedded
        vr-mode-ui="enabled: false"
        renderer="logarithmicDepthBuffer: true; antialias: true; alpha: true;"
        loading-screen="enabled: false"
    >
        <!-- Lights -->
        <a-entity light="type: ambient; intensity: 0.8;"></a-entity>
        <a-entity light="type: directional; intensity: 0.8;" position="1 2 1"></a-entity>

        <!-- ===== MARKER WITH YOUR MODEL ===== -->
        <a-marker 
            id="marker" 
            preset="hiro" 
            emitevents="true"
        >
            
            <!-- 🔥 YOUR MODEL (replaces the red cube) -->
            <a-entity
                id="model-entity"
                gltf-model="url(mode.glb)"
                scale="0.5 0.5 0.5"
                position="0 0.2 0"
                rotation="0 0 0"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear"
            ></a-entity>

        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        (function() {
            const overlay = document.getElementById('startOverlay');
            const startBtn = document.getElementById('startBtn');
            const scene = document.getElementById('scene');

            startBtn.addEventListener('click', async function() {
                startBtn.disabled = true;
                startBtn.textContent = 'Starting...';

                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: 'environment' }
                    });
                    stream.getTracks().forEach(track => track.stop());

                    scene.setAttribute('arjs', [
                        'sourceType: webcam',
                        'debugUIEnabled: false',
                        'detectionMode: mono_and_matrix',
                        'matrixCodeType: 3x3'
                    ].join('; '));

                    overlay.classList.add('hidden');

                    console.log('✅ AR started. Point at the HIRO marker!');

                } catch (err) {
                    alert('Camera error: ' + err.message);
                    console.error(err);
                    startBtn.disabled = false;
                    startBtn.textContent = 'Start Camera';
                }
            });

        })();
    </script>

</body>
</html>
