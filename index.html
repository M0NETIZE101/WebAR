<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Pteradactal</title>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000; 
            overflow: hidden; 
            position: fixed;
            width: 100%;
            height: 100%;
        }
        
        #ar-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        
        /* Loading */
        #loading {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
            color: white;
        }
        #loading .spinner {
            width: 50px; height: 50px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #loading-text { font-size: 18px; color: #888; }
        
        /* Instructions */
        #instructions {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .box {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            text-align: center;
            color: white;
        }
        .box h2 { margin-bottom: 15px; font-size: 24px; }
        .box p { margin-bottom: 30px; opacity: 0.8; line-height: 1.6; }
        #start-btn {
            background: linear-gradient(135deg, #00d4ff, #0072ff);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s;
            width: 100%;
        }
        #start-btn:hover { transform: scale(1.05); }
        #start-btn:active { transform: scale(0.95); }
        #start-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        #status-text {
            margin-top: 15px;
            font-size: 14px;
            opacity: 0.7;
            min-height: 20px;
        }
        
        /* Status Message */
        #status-msg {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 50px;
            color: white;
            font-size: 14px;
            z-index: 200;
            border: 1px solid rgba(255,255,255,0.1);
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
            white-space: nowrap;
        }
        #status-msg.show { opacity: 1; }
        #status-msg.success { border-color: #00d4ff; color: #00d4ff; }
        #status-msg.error { border-color: #ff4444; color: #ff4444; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- ===== LOADING ===== -->
    <div id="loading">
        <div class="spinner"></div>
        <p id="loading-text">Loading Pteradactal...</p>
    </div>

    <!-- ===== INSTRUCTIONS ===== -->
    <div id="instructions">
        <div class="box">
            <h2>🦕 AR Pteradactal</h2>
            <p>Point your camera at the QR code to see the Pteradactal come to life!</p>
            <button id="start-btn">📷 Start AR</button>
            <p id="status-text">Camera permission required</p>
        </div>
    </div>

    <!-- ===== AR CONTAINER ===== -->
    <div id="ar-container"></div>

    <!-- ===== STATUS ===== -->
    <div id="status-msg"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

        // ============================================================
        // DOM ELEMENTS
        // ============================================================
        const loading = document.getElementById('loading');
        const loadingText = document.getElementById('loading-text');
        const instructions = document.getElementById('instructions');
        const startBtn = document.getElementById('start-btn');
        const statusText = document.getElementById('status-text');
        const statusMsg = document.getElementById('status-msg');
        const container = document.getElementById('ar-container');

        // ============================================================
        // STATE
        // ============================================================
        let scene, camera, renderer;
        let model = null;
        let isArRunning = false;
        let hasPermission = false;

        // ============================================================
        // HELPERS
        // ============================================================
        function showStatus(message, type = '') {
            statusMsg.textContent = message;
            statusMsg.className = 'show ' + type;
            console.log('📱', message);
        }

        function updateStatus(text) {
            statusText.textContent = text;
        }

        function debug(message) {
            console.log('🔍', message);
        }

        // ============================================================
        // SETUP SCENE
        // ============================================================
        function setupScene() {
            debug('Setting up scene...');
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 1.6, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.xr.enabled = true;
            
            container.appendChild(renderer.domElement);

            // Lights
            const ambient = new THREE.AmbientLight(0x404040, 0.5);
            scene.add(ambient);
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
            dirLight.position.set(0, 5, 5);
            scene.add(dirLight);
            
            const fill = new THREE.DirectionalLight(0x4488ff, 0.3);
            fill.position.set(-5, 0, 5);
            scene.add(fill);
            
            const hemi = new THREE.HemisphereLight(0x87ceeb, 0x362d1e, 0.3);
            scene.add(hemi);

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            debug('✅ Scene setup complete');
        }

        // ============================================================
        // LOAD MODEL
        // ============================================================
        async function loadModel() {
            return new Promise((resolve, reject) => {
                debug('Loading model...');
                loadingText.textContent = '🦕 Loading Pteradactal...';

                const loader = new GLTFLoader();
                const dracoLoader = new DRACOLoader();
                dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
                loader.setDRACOLoader(dracoLoader);

                loader.load(
                    './models/dinosaur/Pteradactal.glb',
                    (gltf) => {
                        debug('✅ Model loaded!');
                        model = gltf.scene;
                        model.scale.set(0.3, 0.3, 0.3);
                        model.position.set(0, 0, -0.5);

                        // Animation
                        if (gltf.animations && gltf.animations.length > 0) {
                            const mixer = new THREE.AnimationMixer(model);
                            const action = mixer.clipAction(gltf.animations[0]);
                            action.play();
                            model.userData.mixer = mixer;
                            debug('🎬 Animation playing');
                        }

                        loadingText.textContent = '✅ Ready!';
                        setTimeout(() => {
                            loading.classList.add('hidden');
                        }, 500);

                        resolve(model);
                    },
                    (progress) => {
                        const pct = Math.round((progress.loaded / progress.total) * 100);
                        loadingText.textContent = `📥 Loading... ${pct}%`;
                    },
                    (error) => {
                        debug('❌ Model error: ' + error.message);
                        reject(error);
                    }
                );
            });
        }

        // ============================================================
        // REQUEST CAMERA PERMISSION
        // ============================================================
        async function requestCameraPermission() {
            debug('📷 Requesting camera permission...');
            updateStatus('📷 Requesting camera access...');
            startBtn.disabled = true;
            startBtn.textContent = '⏳ Requesting...';

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' }
                });
                
                hasPermission = true;
                stream.getTracks().forEach(track => track.stop());
                
                debug('✅ Camera permission granted');
                updateStatus('✅ Camera access granted');
                startBtn.textContent = '📷 Start AR';
                startBtn.disabled = false;
                return true;
                
            } catch (error) {
                debug('❌ Camera denied: ' + error.message);
                updateStatus('❌ Camera denied - check browser settings');
                startBtn.textContent = '🔄 Retry';
                startBtn.disabled = false;
                showStatus('❌ Camera permission needed', 'error');
                return false;
            }
        }

        // ============================================================
        // START AR - DIRECT METHOD (NO ARBUTTON)
        // ============================================================
        async function startAR() {
            debug('🚀 Starting AR...');
            showStatus('📷 Starting AR...', '');
            startBtn.disabled = true;
            startBtn.textContent = '⏳ Starting...';
            updateStatus('⏳ Starting AR...');

            try {
                // Check WebXR
                if (!navigator.xr) {
                    throw new Error('WebXR not supported');
                }

                // Check AR support
                let supported = false;
                try {
                    supported = await navigator.xr.isSessionSupported('immersive-ar');
                } catch (e) {
                    throw new Error('Cannot check AR support');
                }

                if (!supported) {
                    throw new Error('AR not supported on this device');
                }

                debug('✅ AR is supported');

                // Ensure we have permission
                if (!hasPermission) {
                    const granted = await requestCameraPermission();
                    if (!granted) {
                        throw new Error('Camera permission required');
                    }
                }

                // Create AR session DIRECTLY
                debug('Creating AR session...');
                updateStatus('⏳ Creating AR session...');
                
                const session = await navigator.xr.requestSession('immersive-ar', {
                    requiredFeatures: ['local-floor']
                });

                debug('✅ AR Session created!');
                showStatus('✅ AR Active!', 'success');
                updateStatus('✅ AR Active - Scan QR code');

                // Set session on renderer
                await renderer.xr.setSession(session);

                // Add model to scene
                if (model) {
                    scene.add(model);
                    model.visible = true;
                    debug('✅ Model added to scene');
                }

                // Hide instructions
                instructions.classList.add('hidden');
                startBtn.textContent = '✅ Active';

                // Animation loop
                renderer.setAnimationLoop(() => {
                    if (model && model.userData && model.userData.mixer) {
                        model.userData.mixer.update(0.016);
                    }
                    renderer.render(scene, camera);
                });

                // Handle session end
                session.addEventListener('end', () => {
                    debug('⏹️ AR Session ended');
                    isArRunning = false;
                    renderer.setAnimationLoop(null);
                    showStatus('AR session ended', '');
                    instructions.classList.remove('hidden');
                    startBtn.textContent = '📷 Restart AR';
                    startBtn.disabled = false;
                    updateStatus('Session ended - tap to restart');
                });

                isArRunning = true;

            } catch (error) {
                debug('❌ AR start failed: ' + error.message);
                showStatus('❌ ' + error.message, 'error');
                startBtn.textContent = '🔄 Retry';
                startBtn.disabled = false;
                updateStatus('❌ ' + error.message);
                
                // Show fallback
                showFallback(error.message);
            }
        }

        // ============================================================
        // FALLBACK
        // ============================================================
        function showFallback(message) {
            let fallback = document.getElementById('fallback');
            if (!fallback) {
                fallback = document.createElement('div');
                fallback.id = 'fallback';
                fallback.style.cssText = `
                    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                    background: #1a1a2e; display: flex; justify-content: center; align-items: center;
                    z-index: 500; padding: 20px;
                `;
                document.body.appendChild(fallback);
            }
            
            fallback.innerHTML = `
                <div style="max-width: 400px; background: rgba(255,255,255,0.05); padding: 40px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); text-align: center; color: white;">
                    <h2 style="color: #ff6b6b;">⚠️ AR Not Available</h2>
                    <p style="opacity: 0.8; margin: 20px 0; line-height: 1.6;">
                        ${message}<br><br>
                        <strong>Try:</strong>
                        <br>• Chrome on Android
                        <br>• Safari on iOS 15+
                        <br>• HTTPS connection
                    </p>
                    <a href="desktop-viewer.html" style="display: inline-block; padding: 12px 30px; background: #00d4ff; color: #000; text-decoration: none; border-radius: 10px; font-weight: bold;">View 3D Model</a>
                    <br><br>
                    <button onclick="location.reload()" style="padding: 12px 30px; background: transparent; border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: 10px; cursor: pointer;">🔄 Retry</button>
                </div>
            `;
            fallback.style.display = 'flex';
        }

        // ============================================================
        // INIT
        // ============================================================
        async function init() {
            debug('🚀 Initializing...');
            
            try {
                setupScene();
                await loadModel();
                
                // Show instructions
                instructions.classList.remove('hidden');
                updateStatus('📷 Tap "Start AR" to begin');
                
                // Start button
                startBtn.addEventListener('click', async () => {
                    // If no permission, request it first
                    if (!hasPermission) {
                        const granted = await requestCameraPermission();
                        if (granted) {
                            await startAR();
                        }
                    } else {
                        await startAR();
                    }
                });
                
                debug('✅ Ready!');
                
            } catch (error) {
                debug('❌ Init error: ' + error.message);
                showFallback(error.message);
            }
        }

        // ============================================================
        // START
        // ============================================================
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
