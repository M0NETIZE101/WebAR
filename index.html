<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AR Experience</title>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <!-- AR.js -->
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.min.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="permission-overlay">
        <div class="icon">📷</div>
        <h1>AR Experience</h1>
        <p>Point your camera at the Hiro marker to see the 3D car.</p>
        <button id="start-btn">Start AR</button>
    </div>

    <div id="error-screen">
        <div class="icon">⚠️</div>
        <h2>Camera Access Required</h2>
        <p id="error-message">Camera permission was denied.</p>
        <button id="reload-btn">🔄 Reload</button>
    </div>

    <div id="loading" class="hidden">
        <div class="spinner"></div>
        <span id="loading-text">Loading AR...</span>
    </div>

    <div id="marker-prompt" class="hidden">📍 Point your camera at the marker</div>

    <a-scene
        id="ar-scene"
        embedded
        vr-mode-ui="enabled: false"
        renderer="logarithmicDepthBuffer: true; antialias: true;"
        loading-screen="enabled: false"
        shadow="enabled: false;"
    >

        <!-- ==========================================
             🔥 LIGHTING — MULTI-ANGLE, NO SHADOWS
             ========================================== -->

        <!-- Ambient light — soft fill -->
        <a-entity light="type: ambient; intensity: 0.7; color: #ffffff;"></a-entity>

        <!-- Light from front-right (main) -->
        <a-entity light="type: directional; intensity: 1.2; color: #ffffff;" position="2 3 2"></a-entity>

        <!-- Light from front-left (fill) -->
        <a-entity light="type: directional; intensity: 1.0; color: #ffffff;" position="-2 2 -1"></a-entity>

        <!-- Light from back (rim) -->
        <a-entity light="type: directional; intensity: 0.8; color: #ffffff;" position="0 -1 2"></a-entity>

        <!-- Light from back-right -->
        <a-entity light="type: directional; intensity: 0.6; color: #ffffff;" position="2 -1 -2"></a-entity>

        <!-- Light from back-left -->
        <a-entity light="type: directional; intensity: 0.6; color: #ffffff;" position="-2 -1 2"></a-entity>

        <!-- Hemispherical light — sky/ground bounce -->
        <a-entity light="type: hemispherical; intensity: 0.5; color: #ffffff; groundColor: #888888;"></a-entity>

        <!-- ==========================================
             MARKER & MODEL — KEEP ORIGINAL TEXTURES
             ========================================== -->

        <a-marker 
            id="ar-marker" 
            preset="hiro" 
            emitevents="true" 
            smooth="true" 
            smoothCount="5"
        >

            <!-- 🔥 CAR MODEL — NO MATERIAL OVERRIDE, KEEP TEXTURES -->
            <a-entity
                id="model-entity"
                gltf-model="url(model.glb)"
                scale="0.5 0.5 0.5"
                position="0 0.5 0"
                rotation="0 0 0"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear"
            ></a-entity>

            <!-- Shadow disc (very subtle) -->
            <a-entity position="0 -0.02 0" rotation="-90 0 0">
                <a-circle material="color: black; transparent: true; opacity: 0.08;" radius="0.5"></a-circle>
            </a-entity>

        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script src="app.js"></script>

</body>
</html>
