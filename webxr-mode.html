<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WebXR — 6DoF AR</title>

    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: 'Inter', sans-serif; }

        #ui { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 10; text-align: center; color: white; background: rgba(0,0,0,0.7); padding: 12px 24px; border-radius: 12px; font-size: 14px; }
        #ui.hidden { opacity: 0; pointer-events: none; }

        #back-btn { position: fixed; top: 20px; left: 20px; z-index: 100; color: white; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; font-family: 'Inter', sans-serif; backdrop-filter: blur(4px); text-decoration: none; color: #fff; }
        #back-btn:hover { background: rgba(255,255,255,0.1); }

        #start-overlay { position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; color: white; }
        #start-overlay button { padding: 16px 48px; font-size: 1.2rem; background: #6C5CE7; color: white; border: none; border-radius: 12px; cursor: pointer; }
        #start-overlay.hidden { display: none; }

        #model-bar { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); z-index: 10; display: flex; gap: 12px; }
        .model-btn { padding: 10px 24px; border: 2px solid rgba(255,255,255,0.3); background: rgba(0,0,0,0.7); color: #fff; border-radius: 30px; cursor: pointer; font-size: 14px; font-weight: 600; backdrop-filter: blur(4px); transition: all 0.3s; }
        .model-btn.active { border-color: #6C5CE7; background: rgba(108, 92, 231, 0.4); }

        #loading { position: fixed; bottom: 150px; left: 50%; transform: translateX(-50%); z-index: 100; color: white; font-size: 14px; background: rgba(0,0,0,0.6); padding: 8px 16px; border-radius: 20px; }
        #loading.hidden { display: none; }
    </style>
</head>
<body>

    <a id="back-btn" href="index.html">← Back</a>

    <div id="start-overlay">
        <h1>🌍 WebXR 6DoF AR</h1>
        <p>Point at the Hiro marker to place the model.<br>The model stays in the real world even after the marker is removed.</p>
        <button id="start-btn">Start AR</button>
    </div>

    <div id="ui">🔍 Point at the Hiro marker to place the model</div>
    <div id="loading" class="hidden">⏳ Loading model...</div>

    <div id="model-bar">
        <button class="model-btn active" data-model="car">🚗 Car</button>
        <button class="model-btn" data-model="mecha">🤖 Mecha</button>
    </div>

    <a-scene
        id="ar-scene"
        embedded
        vr-mode-ui="enabled: false"
        renderer="antialias: true; alpha: true;"
        loading-screen="enabled: false"
        webxr="requiredFeatures: hit-test,local-floor; optionalFeatures: dom-overlay;"
    >

        <a-entity light="type: ambient; intensity: 0.6;"></a-entity>
        <a-entity light="type: directional; intensity: 1.0;" position="2 3 2"></a-entity>

        <a-marker
            id="ar-marker"
            preset="hiro"
            emitevents="true"
            smooth="true"
            smoothCount="5"
        ></a-marker>

        <a-entity id="world-anchor" visible="false">

            <a-cylinder
                position="0 0 0"
                radius="0.3"
                height="0.05"
                color="#222222"
                metalness="0.6"
                roughness="0.3"
            ></a-cylinder>

            <a-entity
                id="car-model"
                gltf-model="url(model.glb)"
                scale="0.15 0.15 0.15"
                position="0 0.05 0"
                rotation="0 0 0"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear"
                visible="true"
            ></a-entity>

            <a-entity
                id="mecha-model"
                gltf-model="url(mecha.glb)"
                scale="0.15 0.15 0.15"
                position="0 0.05 0"
                rotation="0 0 0"
                animation-mixer="clip: *; loop: repeat; timeScale: 1;"
                visible="false"
            ></a-entity>

            <a-entity position="0 -0.02 0" rotation="-90 0 0">
                <a-circle material="color: black; transparent: true; opacity: 0.15;" radius="0.4"></a-circle>
            </a-entity>

        </a-entity>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
    (function() {
        'use strict';

        const startOverlay = document.getElementById('start-overlay');
        const startBtn = document.getElementById('start-btn');
        const ui = document.getElementById('ui');
        const loading = document.getElementById('loading');
        const scene = document.getElementById('ar-scene');
        const marker = document.getElementById('ar-marker');
        const anchor = document.getElementById('world-anchor');

        let isARStarted = false;
        let isPlaced = false;

        function showLoading() { loading.classList.remove('hidden'); }
        function hideLoading() { loading.classList.add('hidden'); }
        function showUI(text) { ui.textContent = text; ui.classList.remove('hidden'); }
        function hideUI() { ui.classList.add('hidden'); }

        async function startAR() {
            if (isARStarted) return;

            startBtn.disabled = true;
            startBtn.textContent = 'Starting...';

            try {
                if (!navigator.xr) {
                    throw new Error('WebXR not supported on this device.');
                }

                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' }
                });
                stream.getTracks().forEach(track => track.stop());

                scene.setAttribute('webxr', 'requiredFeatures: hit-test,local-floor; optionalFeatures: dom-overlay;');
                scene.setAttribute('arjs', [
                    'sourceType: webcam',
                    'debugUIEnabled: false',
                    'detectionMode: mono_and_matrix',
                    'matrixCodeType: 3x3',
                    'trackingMethod: best'
                ].join('; '));

                await waitForWebXR();

                startOverlay.classList.add('hidden');
                showUI('🔍 Point at the Hiro marker to place the model');
                showLoading();

                isARStarted = true;
                console.log('[AR] ✅ WebXR + AR.js hybrid started');

            } catch (err) {
                console.error('[AR] ❌ Error:', err);
                alert('Error: ' + err.message);
                startBtn.disabled = false;
                startBtn.textContent = 'Start AR';
            }
        }

        function waitForWebXR(timeout = 20000) {
            return new Promise((resolve, reject) => {
                const startTime = Date.now();

                function check() {
                    const xrSystem = scene.systems && scene.systems['webxr'];
                    if (xrSystem && xrSystem.session) {
                        console.log('[AR] ✅ WebXR session active');
                        resolve(xrSystem);
                        return;
                    }
                    if (Date.now() - startTime > timeout) {
                        reject(new Error('WebXR session timed out. Make sure your device supports ARCore/ARKit.'));
                        return;
                    }
                    setTimeout(check, 100);
                }
                check();
            });
        }

        function setupModelEvents() {
            const models = document.querySelectorAll('#car-model, #mecha-model');
            models.forEach(model => {
                model.addEventListener('model-loaded', () => {
                    console.log('[AR] ✅ Model loaded:', model.id);
                    hideLoading();
                    hideUI();
                });
                model.addEventListener('model-error', () => {
                    console.warn('[AR] ❌ Model error:', model.id);
                    hideLoading();
                });
                if (model.hasLoaded) {
                    hideLoading();
                    hideUI();
                }
            });
        }

        function setupModelSwitching() {
            const buttons = document.querySelectorAll('.model-btn');
            const carModel = document.getElementById('car-model');
            const mechaModel = document.getElementById('mecha-model');

            buttons.forEach(btn => {
                btn.addEventListener('click', function() {
                    buttons.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');

                    if (this.dataset.model === 'car') {
                        carModel.setAttribute('visible', 'true');
                        mechaModel.setAttribute('visible', 'false');
                    } else {
                        carModel.setAttribute('visible', 'false');
                        mechaModel.setAttribute('visible', 'true');
                    }
                });
            });
        }

        function setupMarkerPlacement() {
            marker.addEventListener('markerFound', () => {
                if (isPlaced) {
                    console.log('[AR] Model already placed, ignoring marker');
                    return;
                }

                console.log('[AR] 🔥 Marker detected — placing model');

                const pos = new THREE.Vector3();
                marker.object3D.getWorldPosition(pos);

                const quat = new THREE.Quaternion();
                marker.object3D.getWorldQuaternion(quat);
                const euler = new THREE.Euler().setFromQuaternion(quat, 'YXZ');

                anchor.setAttribute('position', { x: pos.x, y: pos.y, z: pos.z });
                anchor.setAttribute('rotation', {
                    x: 0,
                    y: THREE.MathUtils.radToDeg(euler.y),
                    z: 0
                });
                anchor.setAttribute('visible', 'true');

                isPlaced = true;
                hideUI();
                hideLoading();
                console.log('[AR] ✅ Model placed at:', pos);
            });

            marker.addEventListener('markerLost', () => {
                console.log('[AR] Marker lost — model stays anchored');
            });
        }

        startBtn.addEventListener('click', startAR);
        setupModelEvents();
        setupModelSwitching();
        setupMarkerPlacement();

        console.log('[AR] 🚀 WebXR 6DoF AR ready');
        console.log('[AR] 📌 Model stays in place after placement');

    })();
    </script>

</body>
</html>
