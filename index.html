<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>WebAR Pteradactal - QR Tracking</title>
    
    <link rel="stylesheet" href="css/style.css" />
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="loading-screen">
        <div class="loader-container">
            <div class="loader"></div>
            <p id="loading-text">Initializing AR...</p>
            <p id="debug-info" style="color: #ff6b6b; font-size: 12px; margin-top: 20px; max-width: 300px; word-wrap: break-word;"></p>
        </div>
    </div>

    <div id="instructions" style="display: none;">
        <div class="instruction-box">
            <h2>📱 Point your camera at the QR code</h2>
            <p>Scan the QR marker to see the Pteradactal in AR</p>
            <button id="start-ar-btn">Start AR Experience</button>
        </div>
    </div>

    <div id="ar-container"></div>
    <div id="status-message"></div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
